<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Store — Iniciar Sesión</title>
  <meta name="description" content="Iniciá sesión en Food Store">
  <link rel="stylesheet" href="../../../style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <main class="login">
    <div class="login__card">
      <h1 class="login__brand">FoodStore</h1>
      <p class="login__subtitle">Iniciar Sesión</p>

      <form class="login__form" action="#" method="post" id="login-form">
        <div class="login__field">
          <label class="login__label" for="email">Email</label>
          <input class="login__input" type="email" id="email" name="email" placeholder="tu@email.com" required>
        </div>

        <div class="login__field">
          <label class="login__label" for="password">Contraseña</label>
          <input class="login__input" type="password" id="password" name="password" placeholder="Tu contraseña"
            required>
        </div>

        <button class="btn btn--full login__submit" type="submit">Ingresar</button>
      </form>

      <p class="login__footer">
        ¿No tenés cuenta? <a href="../register/register.html">Registrate</a>
      </p>
    </div>
  </main>
  <script type="module" src="login.ts"></script>
</body>
