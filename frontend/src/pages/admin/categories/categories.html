<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestión de categorías — Food Store">
  <link rel="stylesheet" href="../../../style.css">
  <title>Food Store — Categorías</title>
</head>

<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2 class="admin-sidebar__brand">Food<span>Store</span> Admin</h2>
      <nav class="admin-sidebar__nav" aria-label="Navegación admin">
        <a class="admin-sidebar__link" href="../adminHome/adminHome.html">Dashboard</a>
        <a class="admin-sidebar__link" href="categories.html">Categorías</a>
        <a class="admin-sidebar__link" href="../products/products.html">Productos</a>
        <a class="admin-sidebar__link" href="../orders/orders.html">Pedidos</a>
        <a class="admin-sidebar__link" href="../../store/home/home.html">Ver Tienda</a>
        <a class="admin-sidebar__link" href="#" id="logout-btn">Cerrar sesión</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin__header">
        <h1 class="admin__title">Gestión de Categorías</h1>
        <button class="btn btn--primary" id="new-cat-btn">Nueva categoría</button>
      </header>

      <div class="table-responsive">
        <table class="table-desktop">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cat-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal alta/edición -->
  <div id="cat-modal" class="modal" style="display: none;">
    <div class="modal__backdrop" id="cat-modal-backdrop"></div>
    <div class="modal__content" role="dialog" aria-modal="true">
      <button class="modal__close" id="cat-modal-close" aria-label="Cerrar">&times;</button>
      <h2 class="modal__title" id="cat-modal-title">Nueva categoría</h2>
      <form id="cat-form" action="#" method="post">
        <input type="hidden" id="cat-id">
        <div class="form-field">
          <label class="form-field__label" for="cat-nombre">Nombre</label>
          <input class="form-field__input" id="cat-nombre" name="nombre" type="text" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="cat-descripcion">Descripción</label>
          <input class="form-field__input" id="cat-descripcion" name="descripcion" type="text" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="cat-imagen">Imagen (URL)</label>
          <input class="form-field__input" id="cat-imagen" name="imagen" type="url" required>
        </div>
        <div class="form-actions">
          <button class="btn btn--full btn--primary" type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="categories.ts"></script>
</body>

</html>
