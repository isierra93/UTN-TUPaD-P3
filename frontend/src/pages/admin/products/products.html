<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Store — Productos</title>
  <meta name="description" content="Gestión de productos Food Store">
  <link rel="stylesheet" href="../../../style.css">
</head>

<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2 class="admin-sidebar__brand">Food<span>Store</span> Admin</h2>
      <nav class="admin-sidebar__nav" aria-label="Navegación admin">
        <a class="admin-sidebar__link" href="../adminHome/adminHome.html">Dashboard</a>
        <a class="admin-sidebar__link" href="../categories/categories.html">Categorías</a>
        <a class="admin-sidebar__link" href="products.html">Productos</a>
        <a class="admin-sidebar__link" href="../orders/orders.html">Pedidos</a>
        <a class="admin-sidebar__link" href="../../store/home/home.html">Ver Tienda</a>
        <a class="admin-sidebar__link" href="#" id="logout-btn">Cerrar sesión</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin__header">
        <h1 class="admin__title">Gestión de Productos</h1>
        <button class="btn btn--primary" id="new-prod-btn">Nuevo producto</button>
      </header>

      <div class="table-responsive">
        <table class="table-desktop">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Categoría</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="prod-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal alta/edición -->
  <div id="prod-modal" class="modal" style="display: none;">
    <div class="modal__backdrop" id="prod-modal-backdrop"></div>
    <div class="modal__content" role="dialog" aria-modal="true">
      <button class="modal__close" id="prod-modal-close" aria-label="Cerrar">&times;</button>
      <h2 class="modal__title" id="prod-modal-title">Nuevo producto</h2>
      <form id="prod-form" action="#" method="post">
        <input type="hidden" id="prod-id">
        <div class="form-field">
          <label class="form-field__label" for="prod-nombre">Nombre</label>
          <input class="form-field__input" id="prod-nombre" name="nombre" type="text" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="prod-descripcion">Descripción</label>
          <input class="form-field__input" id="prod-descripcion" name="descripcion" type="text" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="prod-precio">Precio</label>
          <input class="form-field__input" id="prod-precio" name="precio" type="number" step="0.01" min="0" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="prod-stock">Stock</label>
          <input class="form-field__input" id="prod-stock" name="stock" type="number" min="0" required>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="prod-categoria">Categoría</label>
          <select class="form-field__select" id="prod-categoria" name="categoria" required></select>
        </div>
        <div class="form-field">
          <label class="form-field__label" for="prod-imagen">Imagen (URL)</label>
          <input class="form-field__input" id="prod-imagen" name="imagen" type="url">
        </div>
        <div class="form-field form-field--inline">
          <input id="prod-disponible" name="disponible" type="checkbox" checked>
          <label class="form-field__label" for="prod-disponible">Disponible</label>
        </div>
        <div class="form-actions">
          <button class="btn btn--full btn--primary" type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="products.ts"></script>
</body>

</html>
