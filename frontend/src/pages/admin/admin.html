<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Store — Panel de Administración</title>
  <meta name="description" content="Panel de administración de productos Food Store">
  <link rel="stylesheet" href="../../style.css">
</head>

<body>
  <div class="admin">
    <!-- Admin Header -->
    <header class="admin__header">
      <h1 class="admin__title">Panel de Administración</h1>
      <nav aria-label="Navegación admin">
        <a class="btn btn--ghost" href="../home/home.html">Volver a la Tienda</a>
      </nav>
    </header>

    <!-- Admin Body -->
    <main class="admin__body">
      <!-- Inventory Table -->
      <section class="table-section" aria-labelledby="inventory-heading">
        <h2 class="table-section__heading" id="inventory-heading">Gestión de Inventario</h2>
        <div class="table-responsive">
          <table class="table-desktop" aria-describedby="inventory-desc">
            <caption id="inventory-desc" class="sr-only">Tabla con el inventario actual</caption>
            <thead>
              <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="admin-products">

            </tbody>
          </table>
        </div>
      </section>

      <!-- Add Product Form -->
      <details class="form-section">
        <summary class="form-section__toggle">Agregar Producto Rápido</summary>
        <form class="form-section__body" action="#" method="post" aria-label="Agregar producto rápido">
          <div class="form-field">
            <label class="form-field__label" for="p-name">Nombre</label>
            <input class="form-field__input" id="p-name" name="name" type="text" placeholder="Nombre del producto"
              required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="p-desc">Descripción</label>
            <input class="form-field__input" id="p-desc" name="description" type="text"
              placeholder="Descripción del producto" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="p-price">Precio</label>
            <input class="form-field__input" id="p-price" name="price" type="number" step="0.01" placeholder="0.00"
              required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="p-stock">Stock</label>
            <input class="form-field__input" id="p-stock" name="stock" type="number" placeholder="0" required>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="p-cat">Categoría</label>
            <select class="form-field__select" id="p-cat" name="category" required>
              <option value="">Seleccione categoría</option>
            </select>
          </div>

          <div class="form-actions">
            <button class="btn btn--full" type="submit">Agregar Producto</button>
          </div>
        </form>
      </details>
    </main>
  </div>
  <script type="module" src="admin.ts"></script>
  <!-- Footer -->
  <footer class="footer">
    <p class="footer__text">Contacto: contacto@foodstore.example — Tel: +54 9 11 0000 0000</p>
  </footer>
</body>
